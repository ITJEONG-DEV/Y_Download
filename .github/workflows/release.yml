name: Release

# vX.Y.Z 형태의 버전 태그를 push하면 exe를 빌드해 GitHub Release로 자동 배포한다.
#   예)  git tag v1.0.0
#        git push origin v1.0.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # Release 생성/자산 업로드 권한

env:
  PYTHONUTF8: "1"        # 러너 콘솔 인코딩과 무관하게 Python I/O를 UTF-8로

jobs:
  # 배포 게이트: 테스트가 통과해야만 빌드/릴리스가 진행된다.
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests (network·e2e 제외)
        # e2e(실제 다운로드)는 ffmpeg·유튜브 접속이 필요해 CI에서 제외한다.
        run: python -m pytest -m "not network and not e2e"

  build-and-release:
    needs: test           # 테스트 실패 시 릴리스 중단
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # 주석 태그 메시지(%(contents)) 읽기 위해 전체 히스토리+태그 필요
          fetch-tags: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Stamp version from tag
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v',''
          Set-Content -Path src/version.py -Value "__version__ = `"$v`"" -Encoding utf8
          "VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Building version $v"

      - name: Download ffmpeg (for full build)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force bin | Out-Null
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
          $ff = Get-ChildItem -Recurse ffmpeg_tmp -Filter ffmpeg.exe  | Select-Object -First 1
          $fp = Get-ChildItem -Recurse ffmpeg_tmp -Filter ffprobe.exe | Select-Object -First 1
          Copy-Item $ff.FullName bin/ffmpeg.exe  -Force
          Copy-Item $fp.FullName bin/ffprobe.exe -Force

      - name: Build (full + lite)
        run: python build.py all

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release  | Out-Null
          # full: 폴더형 전체를 zip
          Compress-Archive -Path dist/Y_Downloader/* -DestinationPath "release/Y_Downloader-full-$env:VERSION.zip" -Force
          # lite: 단일 exe + ffmpeg 준비 안내 동봉
          New-Item -ItemType Directory -Force lite_pkg | Out-Null
          Copy-Item dist/Y_Downloader-lite.exe lite_pkg/ -Force
          Copy-Item "docs/lite-ffmpeg-안내.md"   lite_pkg/ -Force
          Compress-Archive -Path lite_pkg/* -DestinationPath "release/Y_Downloader-lite-$env:VERSION.zip" -Force
          Get-ChildItem release

      - name: Compose release body
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = "${{ env.VERSION }}"
          # actions/checkout은 태그를 경량(커밋 SHA)으로만 가져와 주석 메시지가 사라진다.
          # 주석 태그 객체를 명시적으로 다시 받아와야 %(contents)가 태그 메시지를 반환한다.
          git fetch --force origin "refs/tags/${tag}:refs/tags/${tag}" 2>$null
          # 경량 태그면 커밋 메시지가 나오므로, 커밋 메시지와 같으면 기본 문구로 대체
          # Out-String으로 여러 줄을 줄바꿈 보존한 단일 문자열로 만든다(배열→공백연결 방지)
          $commitMsg = (git tag -l --format='%(*contents)' $tag | Out-String).Trim()
          $msg = (git tag -l --format='%(contents)' $tag | Out-String).Trim()
          if ([string]::IsNullOrWhiteSpace($msg) -or $msg.Trim() -eq $tag -or $msg.Trim() -eq $commitMsg.Trim()) {
            $msg = "- 개선 및 버그 수정"
          }
          $tpl = Get-Content -Raw -Encoding utf8 docs/release_body_template.md
          $out = $tpl.Replace('{{TAG}}', $tag).Replace('{{VERSION}}', $ver).Replace('{{CHANGES}}', $msg.Trim())
          Set-Content -Path release_body.md -Value $out -Encoding utf8
          Write-Host "----- release body -----"
          Get-Content release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Y_Downloader ${{ github.ref_name }}"
          files: release/*.zip
          generate_release_notes: true   # body 뒤에 커밋 기반 변경내역 자동 추가
          body_path: release_body.md

  # macOS(.app) 빌드 — PyInstaller는 크로스컴파일 불가라 별도 macos 러너에서 빌드한다.
  # 산출물은 서명/공증되지 않음(미확인 개발자) → 사용자는 최초 실행 시 우클릭>열기 필요.
  # 같은 태그의 릴리스에 자산만 추가로 첨부한다(본문/이름은 windows 잡이 설정).
  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Stamp version from tag
        run: |
          v="${GITHUB_REF_NAME#v}"
          printf '__version__ = "%s"\n' "$v" > src/version.py
          echo "VERSION=$v" >> "$GITHUB_ENV"
          echo "Building version $v"

      - name: Download ffmpeg (static, arch-matched)
        run: |
          arch="$(uname -m)"
          case "$arch" in
            arm64)  suffix="darwin-arm64" ;;
            x86_64) suffix="darwin-x64" ;;
            *) echo "지원하지 않는 아키텍처: $arch" >&2; exit 1 ;;
          esac
          tag="b6.1.1"   # eugeneware/ffmpeg-static (정적 바이너리 릴리스)
          base="https://github.com/eugeneware/ffmpeg-static/releases/download/$tag"
          mkdir -p bin
          curl -L --fail -o bin/ffmpeg  "$base/ffmpeg-$suffix"
          curl -L --fail -o bin/ffprobe "$base/ffprobe-$suffix"
          chmod +x bin/ffmpeg bin/ffprobe
          ./bin/ffmpeg -version | head -1

      - name: Build (.app + ffmpeg 번들)
        run: python build.py full

      - name: Package artifacts (.zip + .dmg)
        run: |
          mkdir -p release
          app="dist/Y_Downloader.app"
          # zip: 자동 업데이트가 사용. ditto로 심볼릭 링크/실행권한을 보존해 압축.
          ditto -c -k --sequesterRsrc --keepParent "$app" "release/Y_Downloader-mac-$VERSION.zip"
          # dmg: 사람이 받아서 드래그 설치하기 편한 형식.
          hdiutil create -volname "Y_Downloader" -srcfolder "$app" -ov -format UDZO \
            "release/Y_Downloader-mac-$VERSION.dmg"
          ls -la release

      - name: Attach macOS assets to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
            release/*.dmg
